<!DOCTYPE html>

  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Polyfill for process.env (Critical for some libraries) -->

    <!-- Tailwind CDN -->

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              lab: {
                white: '#F8FAFC', // Lab Coat White
                mint: '#A7F3D0',  // Fresh Mint
                citrus: '#FDBA74', // Citrus Orange
                water: '#BAE6FD', // Water Blue
                text: '#334155',  // Slate 700
                dark: '#0F172A',  // Slate 900
              }
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            }
          }
        }
      }
    </script>
